<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>钛云数码-专业对账</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --main: #2563eb; --price: #dc2626; --bg: #f3f4f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding: 10px; font-family: system-ui; }
        
        /* 顶部菜单 */
        .admin-bar { 
            background: #fff; padding: 10px; border-radius: 12px; 
            margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; 
            position: sticky; top: 10px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .btn { border: none; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: bold; color: white; }
        .btn-full { grid-column: span 2; background: var(--main); font-size: 15px; }
        .btn-green { background: #10b981; }
        .btn-red { background: #ef4444; }

        /* 内容锁定 */
        #capture-area { width: 100%; max-width: 600px; margin: 0 auto; background: var(--bg); padding-bottom: 20px; }

        .brand-card { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .brand-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 8px; }
        .brand-title { font-size: 17px; font-weight: 800; color: #1e293b; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 5px 2px; }
        input { border: 1px solid #ddd; padding: 8px; border-radius: 5px; width: 100%; font-size: 14px; outline: none; }
        .input-price { color: var(--price); font-weight: bold; text-align: right; border-color: #fee2e2; }
        
        .row-del { color: #f87171; font-size: 20px; cursor: pointer; text-align: center; }
        .add-row { color: var(--main); font-size: 13px; font-weight: bold; text-align: center; padding: 8px; margin-top: 5px; border: 1px dashed var(--main); border-radius: 5px; cursor: pointer; }

        .summary { background: #1e293b; color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; margin-top: 10px; }
        .summary b { color: #fbbf24; font-size: 24px; }

        #mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; padding:10px; overflow-y: auto; text-align:center; }
        #mask img { width: 100%; max-width: 500px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="admin-bar">
    <button class="btn btn-full" onclick="exportImg()">📤 生成对账长图</button>
    <button class="btn btn-green" onclick="copyShortCode()">📋 复制口令</button>
    <button class="btn btn-green" onclick="pasteRestore()">📥 粘贴恢复</button>
    <button class="btn btn-red" onclick="addBrand()">➕ 增品牌</button>
    <button class="btn btn-red" onclick="resetSystem()">🗑️ 重置系统</button>
</div>

<div id="capture-area">
    <div id="content-list"></div>
    <div class="summary">
        <div>数量: <span id="total-q">0</span></div>
        <div style="text-align: right;">合计: ¥ <b id="total-m">0</b></div>
    </div>
    <div style="text-align:center; color:#999; font-size:11px; margin-top:15px;">
        钛云数码 | Egg77Egg88 | 实时自动保存
    </div>
</div>

<div id="mask" onclick="this.style.display='none'">
    <p style="color:#fff">—— 长按图片保存发送 ——</p>
    <div id="img-out"></div>
</div>

<script>
    // 1. 默认品牌
    const DEFAULTS = ["苹果", "华为", "荣耀", "小米/红米", "OPPO", "vivo"];
    let brands = JSON.parse(localStorage.getItem('ty_b')) || DEFAULTS;
    let data = JSON.parse(localStorage.getItem('ty_d')) || {};

    // 2. 渲染引擎 (修复了导致闪退的递归调用)
    function render() {
        const list = document.getElementById('content-list');
        list.innerHTML = brands.map(b => {
            const rows = data[b] || [{m:'', q:1, p:''}];
            return `
                <div class="brand-card" id="card-${b}">
                    <div class="brand-header">
                        <span class="brand-title">${b}</span>
                        <small style="color:#999" onclick="delBrand('${b}')">删除品牌</small>
                    </div>
                    <table id="table-${b}">
                        ${rows.map((r, i) => `
                            <tr id="row-${b}-${i}">
                                <td width="25" class="row-del" onclick="delRow('${b}',${i})">×</td>
                                <td><input type="text" value="${r.m}" placeholder="型号" oninput="upd('${b}',${i},'m',this.value)"></td>
                                <td width="50"><input type="number" value="${r.q}" oninput="upd('${b}',${i},'q',this.value)" style="text-align:center"></td>
                                <td width="90"><input type="number" class="input-price" value="${r.p}" placeholder="¥" oninput="upd('${b}',${i},'p',this.value)"></td>
                            </tr>
                        `).join('')}
                    </table>
                    <div class="add-row" onclick="addRow('${b}')">+ 添加一行</div>
                </div>
            `;
        }).join('');
        calc();
    }

    // 3. 数据操作 (解决输入跳动)
    function upd(b, i, k, v) {
        if(!data[b]) data[b] = [{}];
        data[b][i][k] = v;
        localStorage.setItem('ty_d', JSON.stringify(data));
        calc();
    }

    function addRow(b) {
        if(!data[b]) data[b] = [];
        data[b].push({m:'', q:1, p:''});
        render(); // 添加行操作较少，允许重绘
    }

    function delRow(b, i) {
        data[b].splice(i, 1);
        if(data[b].length === 0) data[b] = [{m:'', q:1, p:''}];
        localStorage.setItem('ty_d', JSON.stringify(data));
        render();
    }

    function addBrand() {
        const n = prompt('品牌名:');
        if(n && !brands.includes(n)) {
            brands.push(n);
            localStorage.setItem('ty_b', JSON.stringify(brands));
            render();
        }
    }

    function delBrand(b) {
        // 直接操作DOM和数据，不触发全量重绘，防闪退
        if(confirm(`确定删除品牌 [${b}] 吗？`)) {
            brands = brands.filter(x => x !== b);
            delete data[b];
            localStorage.setItem('ty_b', JSON.stringify(brands));
            localStorage.setItem('ty_d', JSON.stringify(data));
            const card = document.getElementById(`card-${b}`);
            if(card) card.remove();
            calc();
        }
    }

    function calc() {
        let tQ = 0, tM = 0;
        brands.forEach(b => {
            (data[b] || []).forEach(r => {
                const q = parseFloat(r.q)||0, p = parseFloat(r.p)||0;
                tQ += q; tM += (q*p);
            });
        });
        document.getElementById('total-q').innerText = tQ;
        document.getElementById('total-m').innerText = tM.toLocaleString();
    }

    // 4. 超短口令算法 (只备份有单价的数据)
    function copyShortCode() {
        const leanData = {};
        brands.forEach(b => {
            const validRows = (data[b] || []).filter(r => r.p > 0);
            if(validRows.length > 0) leanData[b] = validRows;
        });
        const code = btoa(encodeURIComponent(JSON.stringify({b:brands, d:leanData})));
        const input = document.createElement('textarea');
        input.value = "钛云口令：" + code;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert('✅ 口令已精简！\n仅包含有单价的数据，发送更稳。');
    }

    function pasteRestore() {
        const str = prompt('粘贴钛云口令：');
        if(!str || !str.includes('钛云口令：')) return;
        try {
            const raw = str.split('钛云口令：')[1].trim();
            const obj = JSON.parse(decodeURIComponent(atob(raw)));
            brands = obj.b; data = obj.d;
            localStorage.setItem('ty_b', JSON.stringify(brands));
            localStorage.setItem('ty_d', JSON.stringify(data));
            render();
            alert('✅ 还原成功！');
        } catch(e) { alert('❌ 口令不完整'); }
    }

    // 5. 截图算法 (修复压屏与看不全)
    async function exportImg() {
        const btn = document.querySelector('.btn-full');
        btn.innerText = "排版中...";
        const area = document.getElementById('capture-area');
        
        // 强制重置滚动条位置防止截图偏位
        window.scrollTo(0,0);

        const canvas = await html2canvas(area, {
            scale: 2,
            useCORS: true,
            logging: false,
            width: area.offsetWidth,
            height: area.scrollHeight,
            windowHeight: area.scrollHeight // 关键：解决电脑截不全
        });
        
        document.getElementById('img-out').innerHTML = `<img src="${canvas.toDataURL('image/png')}">`;
        document.getElementById('mask').style.display = 'block';
        btn.innerText = "📤 生成对账长图";
    }

    function resetSystem() {
        if(confirm('清空所有设置？')) { localStorage.clear(); location.reload(); }
    }

    render();
</script>
</body>
</html>
