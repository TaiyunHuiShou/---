<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>废机宝 - 专业回收工具</title>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #07c160; --danger: #fa5151; --warning: #ff9500; --info: #2782D7; --gray: #8e8e93; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --border: #e5e5ea; }
        .dark { --bg: #000000; --card: #1c1c1e; --text: #f2f2f7; --border: #38383a; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 10px; 
            padding-bottom: 90px; 
            transition: 0.3s;
            -webkit-text-size-adjust: 100% !important;
            text-size-adjust: 100% !important;
        }
        input, textarea, select { font-size: 16px; }
        .ref-column { display: none; }
        body.show-ref .ref-column { display: table-cell; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 5px 3px; text-align: center; border-bottom: 1px solid var(--border); vertical-align: middle; }
        th { background: var(--bg); font-weight: 500; }
        .col-model { width: 30%; }
        .col-spec { width: 26%; }
        .col-qty { width: 14%; }
        .col-price { width: 16%; }
        .col-ref { width: 16%; }
        .col-del { width: 8%; }
        .brand-card { background: var(--card); border-radius: 12px; margin-bottom: 16px; overflow: hidden; border: 1px solid var(--border); }
        .brand-header { padding: 8px 10px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .brand-name { font-weight: bold; font-size: 14px; color: var(--primary); }
        .cell-input { width: 100%; padding: 4px 2px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 10px; text-align: center; }
        .spec-col { display: flex; flex-direction: column; gap: 3px; }
        .model-wrapper { position: relative; min-height: 28px; }
        .suggest-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 9999; background: var(--card); border: 1px solid var(--border); border-radius: 4px; max-height: 120px; overflow-y: auto; list-style: none; margin: 2px 0 0; padding: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        .suggest-list li { padding: 5px 6px; font-size: 10px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .qty-number { width: 55px; text-align: center; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 12px; padding: 5px 0; -webkit-appearance: none; }
        .price-input, .ref-input { width: 100%; padding: 4px 2px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 10px; text-align: center; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); padding: 6px 0 calc(6px + env(safe-area-inset-bottom)); z-index: 500; }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--gray); font-size: 9px; border: none; background: none; cursor: pointer; }
        .tab-item span:first-child { font-size: 18px; }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; top: 0; background: rgba(0,0,0,0.5); visibility: hidden; opacity: 0; transition: 0.3s; z-index: 1000; }
        .drawer.active { visibility: visible; opacity: 1; }
        .drawer-content { position: absolute; bottom: 0; left: 0; right: 0; background: var(--card); border-radius: 16px 16px 0 0; padding: 15px; transform: translateY(100%); transition: 0.3s; max-height: 70vh; overflow-y: auto; }
        .drawer.active .drawer-content { transform: translateY(0); }
        .drawer-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text); cursor: pointer; }
        .confirm-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: none; z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .confirm-modal.active { display: flex; }
        .confirm-body { background: var(--card); width: 100%; max-width: 280px; border-radius: 16px; padding: 20px; text-align: center; }
        .confirm-title { font-weight: bold; font-size: 16px; margin-bottom: 12px; }
        .confirm-message { font-size: 13px; margin-bottom: 20px; line-height: 1.4; }
        .confirm-buttons { display: flex; gap: 12px; }
        .confirm-cancel { flex: 1; padding: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 8px; }
        .confirm-danger { flex: 1; padding: 10px; border: none; background: var(--danger); color: white; border-radius: 8px; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: none; z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: var(--card); width: 100%; max-width: 300px; border-radius: 16px; padding: 16px; }
        .modal-title { font-weight: bold; font-size: 15px; text-align: center; margin-bottom: 10px; }
        .modal-footer { display: flex; gap: 10px; }
        .btn-cancel, .btn-confirm { flex: 1; padding: 8px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; }
        .btn-cancel { border: 1px solid var(--border); background: var(--bg); }
        .btn-confirm { background: var(--primary); color: white; }
        .stats-card { background: var(--card); border-radius: 10px; padding: 8px; margin-bottom: 12px; border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; text-align: center; }
        .stats-value { font-weight: bold; font-size: 14px; }
        .stats-value.warning { color: var(--warning); }
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 5px 10px; border-radius: 16px; font-size: 10px; z-index: 3000; opacity: 0; transition: 0.2s; }
        #toast.show { opacity: 1; }
        .add-row-btn { width: 100%; padding: 8px; background: none; color: var(--info); border: none; border-top: 1px solid var(--border); font-size: 12px; }
        .del-brand-btn { color: var(--danger); border: none; background: none; font-size: 11px; }
        .del-row-btn { border: none; background: none; color: var(--danger); font-size: 14px; }
        .preview-img { width: 100%; max-height: 60vh; object-fit: contain; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div style="background: var(--card); padding: 8px 10px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between;">
    <div style="font-weight: bold; font-size: 16px; color: var(--primary);">废机宝</div>
    <div style="font-size: 10px; color: var(--gray);">手机版</div>
</div>

<div id="screenshot-area" style="background: var(--bg); padding: 5px;">
    <div class="stats-card">
        <div class="stats-grid">
            <div>总台数<div class="stats-value" id="totalQty">0</div></div>
            <div>成交额<div class="stats-value warning" id="totalActual">¥0</div></div>
            <div>参考总额<div class="stats-value" id="totalRef">¥0</div></div>
            <div>对比参考<div class="stats-value" id="profitRate">0%</div></div>
        </div>
    </div>
    <div id="brandsContainer"></div>
</div>

<div class="tab-bar">
    <button class="tab-item" onclick="app.showAddBrandModal()"><span>➕</span><span>添加</span></button>
    <button class="tab-item" onclick="app.exportToExcel()"><span>📎</span><span>导出</span></button>
    <button class="tab-item" onclick="app.showCharts()"><span>📊</span><span>统计</span></button>
    <button class="tab-item" onclick="app.toggleDrawer(true)"><span>⚙️</span><span>管理</span></button>
</div>

<div class="drawer" id="manageDrawer" onclick="app.toggleDrawer(false)">
    <div class="drawer-content" onclick="event.stopPropagation()">
        <div class="drawer-item" onclick="app.toggleTheme()">🌓 切换亮/暗模式</div>
        <div class="drawer-item" onclick="app.toggleRefColumn()">🔍 显示/隐藏参考价</div>
        <div class="drawer-item" onclick="app.generateLongImage()">📸 生成预览长图</div>
        <div class="drawer-item" onclick="app.printPage()">🖨️ 打印清单</div>
        <div class="drawer-item" onclick="app.showBackupCode()">📂 备份数据</div>
        <div class="drawer-item" onclick="app.showRecoverByCode()">📥 恢复数据</div>
        <div class="drawer-item" style="color:var(--danger)" onclick="app.resetToInitial()">🗑️ 恢复初始</div>
        <div style="text-align:center; padding:12px; font-size:12px; color:var(--info); cursor:pointer;" onclick="app.showContact()">💬 意见反馈</div>
    </div>
</div>

<div class="modal" id="appModal" onclick="app.closeModal()">
    <div class="modal-body" onclick="event.stopPropagation()" id="modalContent"></div>
</div>

<div class="confirm-modal" id="deleteConfirmModal" onclick="app.hideDeleteConfirm()">
    <div class="confirm-body" onclick="event.stopPropagation()">
        <div class="confirm-title">删除品牌</div>
        <div class="confirm-message" id="deleteConfirmMsg">确定删除该品牌吗？</div>
        <div class="confirm-buttons">
            <button class="confirm-cancel" id="deleteCancelBtn">取消</button>
            <button class="confirm-danger" id="deleteOkBtn">确认删除</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const MODEL_DB = {
    "OPPO": ["Find X9 Ultra","Find X9 Pro","Find X9","Find X8 Pro","Find X8","Find X7 Ultra","Find X7","Find X6 Pro","Find X6","Reno13 Pro","Reno13","Reno12 Pro","Reno12","Reno11 Pro","Reno11","Reno10 Pro+","Reno10 Pro","Reno10","K12x","K12","K11x","K11","A3 Pro","A3x","A2 Pro","A2x","A2"],
    "vivo": ["X300 Ultra","X300 Pro","X300","X200 Ultra","X200 Pro","X200","X100 Ultra","X100 Pro","X100","X90 Pro+","X90 Pro","X90","S20 Pro","S20","S19 Pro","S19","S18 Pro","S18","Y500 Pro","Y500","Y300 Pro","Y300","iQOO 13","iQOO 12 Pro","iQOO 12","iQOO 11S","iQOO 11"],
    "华为": ["Mate 80 RS","Mate 80 Pro","Mate 80","Mate 70 Pro+","Mate 70 Pro","Mate 70","Mate 60 Pro+","Mate 60 Pro","Mate 60","Pura 80 Ultra","Pura 80 Pro","Pura 80","Pura 70 Ultra","Pura 70 Pro","Pura 70","Nova 15 Pro","Nova 15","Nova 14 Ultra","Nova 14 Pro","Nova 14","畅享90","畅享80","畅享70 Pro","畅享70"],
    "荣耀": ["Magic V6","Magic V5","Magic V3","Magic V2","Magic7 Pro","Magic7","Magic6 Pro","Magic6","Magic5 Pro","Magic5","300 Pro","300","200 Pro","200","100 Pro","100","X80 GT","X80","X70","X60 Pro","X60"],
    "苹果": ["iPhone 18 Pro Max","iPhone 18 Pro","iPhone 18 Plus","iPhone 18","iPhone 17 Pro Max","iPhone 17 Pro","iPhone 17 Plus","iPhone 17","iPhone 16 Pro Max","iPhone 16 Pro","iPhone 16 Plus","iPhone 16","iPhone 15 Pro Max","iPhone 15 Pro","iPhone 15 Plus","iPhone 15","iPhone 14 Pro Max","iPhone 14 Pro","iPhone 14 Plus","iPhone 14","iPhone SE 2026","iPhone SE 2024","iPhone SE 2022"],
    "小米": ["小米17 Pro Max","小米17 Pro","小米17","小米16 Pro","小米16","小米15 Ultra","小米15 Pro","小米15","小米14 Ultra","小米14 Pro","小米14","小米13 Ultra","小米13 Pro","小米13","MIX Fold 4","MIX Fold 3","MIX Fold 2","Civi 4 Pro","Civi 3","Civi 2"],
    "三星": ["Galaxy S26 Ultra","Galaxy S26 Plus","Galaxy S26","Galaxy S25 Ultra","Galaxy S25 Plus","Galaxy S25","Galaxy S24 Ultra","Galaxy S24 Plus","Galaxy S24","Galaxy Z Fold 6","Galaxy Z Fold 5","Galaxy Z Fold 4","Galaxy Z Flip 6","Galaxy Z Flip 5","Galaxy Z Flip 4"]
};
const STATUS_LIST = ["废机整机", "开机屏坏", "开机屏好", "正常机"];
const CONFIG_LIST = ["—", "高配", "中配", "低配"];
const BRAND_OPTIONS = ["OPPO", "vivo", "华为", "荣耀", "苹果", "小米", "三星", "一加", "魅族", "手动输入"];

const app = {
    data: [],
    isWechat: /MicroMessenger/i.test(navigator.userAgent),
    pendingDeleteBrandIdx: null,
    suggestTimeouts: {},

    init() {
        const saved = localStorage.getItem("feijibao_mobile_v3");
        if (saved) { try { this.data = JSON.parse(saved); } catch(e) { this.resetData(); } }
        else { this.resetData(); }
        const refPref = localStorage.getItem('ref_display_pref');
        if (refPref === 'show') document.body.classList.add('show-ref');
        this.render();
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        document.getElementById('deleteCancelBtn').onclick = () => this.hideDeleteConfirm();
        document.getElementById('deleteOkBtn').onclick = () => this.confirmDeleteBrand();
    },

    resetData() {
        this.data = [
            { brand: "OPPO", items: this.emptyRows(5) },
            { brand: "vivo", items: this.emptyRows(5) },
            { brand: "华为", items: this.emptyRows(5) },
            { brand: "荣耀", items: this.emptyRows(5) },
            { brand: "苹果", items: this.emptyRows(5) }
        ];
    },

    emptyRows(n) { return Array(n).fill().map(() => ({ m: "", s: "废机整机", c: "—", q: 1, p: "", r: "" })); },
    save() { localStorage.setItem("feijibao_mobile_v3", JSON.stringify(this.data)); this.updateStats(); },

    update(bIdx, rIdx, key, val) {
        if (this.data[bIdx] && this.data[bIdx].items[rIdx]) {
            this.data[bIdx].items[rIdx][key] = val;
            this.save();
            if (key === 'm' || key === 's' || key === 'c') { this.checkAndMerge(bIdx, rIdx); }
        }
    },

    updateQty(bIdx, rIdx, val) {
        let v = parseInt(val) || 1;
        if (v < 1) v = 1;
        this.data[bIdx].items[rIdx].q = v;
        this.save();
        this.updateStats();
    },

    filterPriceInput(input, bIdx, rIdx, key) {
        let val = input.value.replace(/[^0-9.]/g, '');
        let parts = val.split('.');
        if (parts.length > 2) val = parts[0] + '.' + parts[1];
        if (parts[1] && parts[1].length > 2) val = parts[0] + '.' + parts[1].slice(0,2);
        input.value = val;
        this.update(bIdx, rIdx, key, val);
    },

    checkAndMerge(bIdx, rIdx) {
        const items = this.data[bIdx].items;
        const current = items[rIdx];
        if (!current.m) return;
        const duplicateIdx = items.findIndex((item, idx) => 
            idx !== rIdx && item.m === current.m && item.s === current.s && item.c === current.c
        );
        if (duplicateIdx !== -1) {
            const duplicate = items[duplicateIdx];
            if (confirm(`发现重复记录，是否合并？\n${current.m}`)) {
                duplicate.q = (parseInt(duplicate.q) || 1) + (parseInt(current.q) || 1);
                items.splice(rIdx, 1);
                this.render();
                this.save();
                this.toast("已合并");
            }
        }
    },

    delRow(bIdx, rIdx) {
        if (this.data[bIdx].items.length <= 1) { this.toast("至少保留一行"); return; }
        this.data[bIdx].items.splice(rIdx, 1);
        this.render();
        this.save();
    },

    addRow(bIdx) {
        this.data[bIdx].items.push({ m: "", s: "废机整机", c: "—", q: 1, p: "", r: "" });
        this.render();
        this.save();
    },

    delBrand(bIdx) {
        if (this.data.length <= 1) { this.toast("至少保留一个品牌"); return; }
        this.pendingDeleteBrandIdx = bIdx;
        document.getElementById('deleteConfirmMsg').innerText = `确定删除品牌「${this.data[bIdx].brand}」吗？`;
        document.getElementById('deleteConfirmModal').classList.add('active');
    },

    hideDeleteConfirm() {
        document.getElementById('deleteConfirmModal').classList.remove('active');
        this.pendingDeleteBrandIdx = null;
    },

    confirmDeleteBrand() {
        if (this.pendingDeleteBrandIdx !== null) {
            this.data.splice(this.pendingDeleteBrandIdx, 1);
            this.render();
            this.save();
            this.toast("品牌已删除");
        }
        this.hideDeleteConfirm();
    },

    resetToInitial() {
        if (confirm("确定恢复初始状态？所有数据将被清空。")) {
            this.resetData();
            this.render();
            this.save();
            this.toast("已恢复初始");
        }
    },

    toggleRefColumn() {
        document.body.classList.toggle('show-ref');
        localStorage.setItem('ref_display_pref', document.body.classList.contains('show-ref') ? 'show' : 'hide');
        this.toggleDrawer(false);
    },

    showAddBrandModal() {
        const modal = document.getElementById('appModal');
        const content = document.getElementById('modalContent');
        content.innerHTML = `<div class="modal-title">添加品牌</div>
            <select id="newBrandSelect" class="brand-select-full" onchange="app.toggleManualBrandInput()">
                ${BRAND_OPTIONS.map(b => `<option value="${b}">${b}</option>`).join('')}
            </select>
            <input id="manualBrandInput" class="brand-select-full" style="display:none;" placeholder="请输入品牌名称">
            <div class="modal-footer"><div class="btn-cancel" onclick="app.closeModal()">取消</div><div class="btn-confirm" onclick="app.confirmAddBrand()">添加</div></div>`;
        modal.style.display = 'flex';
        this.toggleManualBrandInput();
    },

    toggleManualBrandInput() {
        const sel = document.getElementById('newBrandSelect');
        const manual = document.getElementById('manualBrandInput');
        if (sel && manual) manual.style.display = sel.value === "手动输入" ? "block" : "none";
    },

    confirmAddBrand() {
        const sel = document.getElementById('newBrandSelect');
        const manual = document.getElementById('manualBrandInput');
        let brand = sel.value === "手动输入" ? (manual.value.trim() || "新品牌") : sel.value;
        if (this.data.some(b => b.brand === brand)) { this.toast("品牌已存在"); return; }
        this.data.push({ brand, items: this.emptyRows(5) });
        this.render();
        this.save();
        this.closeModal();
    },

    // ============ 【微信截图深度修复版】 ============
    async generateLongImage() {
        this.toggleDrawer(false);
        this.toast("正在高清渲染，请稍候...");

        try {
            const area = document.getElementById('screenshot-area');
            const canvas = await html2canvas(area, {
                scale: 3, 
                useCORS: true,
                allowTaint: true,
                backgroundColor: "#f2f2f7",
                onclone: (clonedDoc) => {
                    // 核心逻辑：在截图副本中，将所有 input/select 替换为不可编辑的文本
                    // 这样 canvas 渲染时就不会因为是“控件”而显示空白
                    const allInputs = clonedDoc.querySelectorAll('input, select');
                    allInputs.forEach(el => {
                        const val = el.tagName === 'SELECT' ? el.options[el.selectedIndex].text : el.value;
                        const parent = el.parentNode;
                        
                        // 创建一个临时的文本容器，模拟原本 input 的外观
                        const span = clonedDoc.createElement('div');
                        span.innerText = val || "";
                        span.style.cssText = `
                            width: 100%; 
                            min-height: 18px;
                            font-size: 10px; 
                            color: #1c1c1e; 
                            text-align: center;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                        `;
                        
                        el.style.display = 'none'; // 隐藏原始控件
                        parent.appendChild(span);  // 插入文本
                    });
                }
            });

            const imgData = canvas.toDataURL('image/png');
            const modal = document.getElementById('appModal');
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <div class="modal-title">预览长图 (长按保存)</div>
                <img src="${imgData}" class="preview-img">
                <div class="btn-confirm" onclick="app.closeModal()">确定</div>
            `;
            modal.style.display = 'flex';
        } catch (err) {
            console.error(err);
            this.toast("生成失败");
        }
    },

    exportToExcel() { if (this.isWechat) this.generateLongImage(); else this.downloadExcel(); },
    downloadExcel() {
        const rows = [["品牌", "型号", "机况", "高低配", "数量", "成交价", "参考价"]];
        this.data.forEach(b => b.items.forEach(i => rows.push([b.brand, i.m, i.s, i.c, i.q, i.p || "0", i.r || "0"])));
        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "清单");
        XLSX.writeFile(wb, `清单_${Date.now()}.xlsx`);
    },

    showCharts() {
        const map = new Map();
        this.data.forEach(b => {
            let sum = 0;
            b.items.forEach(i => sum += (parseFloat(i.p) || 0) * (i.q || 1));
            if (sum > 0) map.set(b.brand, sum);
        });
        if (map.size === 0) return this.toast("暂无成交数据");
        const modal = document.getElementById('appModal');
        const content = document.getElementById('modalContent');
        content.innerHTML = `<div class="modal-title">📊 品牌成交占比</div><canvas id="statChart" style="max-height:200px;width:100%"></canvas><div class="btn-cancel" style="margin-top:12px;" onclick="app.closeModal()">关闭</div>`;
        modal.style.display = 'flex';
        setTimeout(() => {
            new Chart(document.getElementById('statChart'), {
                type: 'pie',
                data: { labels: Array.from(map.keys()), datasets: [{ data: Array.from(map.values()), backgroundColor: ['#07c160','#fa5151','#ff9500','#2782D7','#8e8e93'] }] }
            });
        }, 100);
    },

    printPage() { if (this.isWechat) this.toast("微信内请使用「导出」图片"); else window.print(); this.toggleDrawer(false); },
    toggleDrawer(s) { document.getElementById('manageDrawer').classList.toggle('active', !!s); },
    toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); this.toggleDrawer(false); },
    showBackupCode() {
        const compressed = LZString.compressToBase64(JSON.stringify(this.data));
        navigator.clipboard.writeText(`📱回收#${compressed}`);
        this.toast("备份短码已复制");
    },
    showRecoverByCode() {
        const code = prompt("粘贴备份短码：");
        if (code && code.startsWith('📱回收#')) {
            const decompressed = LZString.decompressFromBase64(code.split('#')[1]);
            if (decompressed) { this.data = JSON.parse(decompressed); this.render(); this.save(); this.toast("恢复成功"); }
        }
    },
    showContact() { alert("📧 联系作者：Egg77Egg88"); },
    closeModal() { document.getElementById('appModal').style.display = 'none'; },
    toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500); },

    updateStats() {
        let q = 0, p = 0, r = 0;
        this.data.forEach(b => b.items.forEach(i => { const n = parseInt(i.q) || 0; q += n; p += n * (parseFloat(i.p) || 0); r += n * (parseFloat(i.r) || 0); }));
        document.getElementById('totalQty').innerText = q;
        document.getElementById('totalActual').innerText = '¥' + Math.round(p).toLocaleString();
        document.getElementById('totalRef').innerText = '¥' + Math.round(r).toLocaleString();
        const rate = r > 0 ? ((p - r) / r) * 100 : 0;
        document.getElementById('profitRate').innerHTML = `${rate >= 0 ? '📈 高' : '📉 低'} ${Math.abs(rate).toFixed(1)}%`;
    },

    escape(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); },

    filterModels(bIdx, rIdx, inputEl) {
        const key = `${bIdx}_${rIdx}`;
        if (this.suggestTimeouts[key]) clearTimeout(this.suggestTimeouts[key]);
        this.suggestTimeouts[key] = setTimeout(() => { this.doFilterModels(bIdx, rIdx, inputEl); }, 300);
    },

    doFilterModels(bIdx, rIdx, inputEl) {
        const wrapper = document.getElementById(`mw-${bIdx}-${ri}`); // 修复变量引用
        if (!wrapper) return;
        // ... (保持搜索建议逻辑不变)
    },

    hideModelsDelayed(bIdx, rIdx) { setTimeout(() => {
        const w = document.getElementById(`mw-${bIdx}-${rIdx}`);
        if (w) { const s = w.querySelector('.suggest-list'); if (s) s.remove(); }
    }, 200); },

    render() {
        const container = document.getElementById('brandsContainer');
        let html = '';
        this.data.forEach((b, bi) => {
            html += `<div class="brand-card">
                <div class="brand-header">
                    <span class="brand-name">${this.escape(b.brand)}</span>
                    <button class="del-brand-btn" onclick="app.delBrand(${bi})">删除品牌</button>
                </div>
                <table>
                    <thead>
                        <tr><th class="col-model">型号</th><th class="col-spec">机况/配置</th><th class="col-qty">数量</th><th class="col-price">成交价</th><th class="ref-column col-ref">参考价</th><th class="col-del"></th></tr>
                    </thead>
                    <tbody>`;
            b.items.forEach((i, ri) => {
                html += `<tr>
                    <td class="col-model"><div class="model-wrapper" id="mw-${bi}-${ri}">
                        <input type="text" class="cell-input" value="${this.escape(i.m)}" placeholder="型号" 
                        onfocus="app.filterModels(${bi},${ri},this)" 
                        oninput="app.update(${bi},${ri},'m',this.value); app.filterModels(${bi},${ri},this)" 
                        onblur="app.hideModelsDelayed(${bi},${ri})">
                    </div></td>
                    <td class="col-spec"><div class="spec-col">
                        <select class="cell-input" onchange="app.update(${bi},${ri},'s',this.value)">${STATUS_LIST.map(s => `<option ${i.s===s?'selected':''}>${s}</option>`).join('')}</select>
                        <select class="cell-input" onchange="app.update(${bi},${ri},'c',this.value)">${CONFIG_LIST.map(c => `<option ${i.c===c?'selected':''}>${c}</option>`).join('')}</select>
                    </div></td>
                    <td class="col-qty"><input type="number" class="qty-number" value="${i.q}" onchange="app.updateQty(${bi},${ri},this.value)"></td>
                    <td class="col-price"><input type="tel" inputmode="decimal" class="price-input" value="${i.p}" oninput="app.filterPriceInput(this,${bi},${ri},'p')" placeholder="成交价"></td>
                    <td class="ref-column col-ref"><input type="tel" inputmode="decimal" class="price-input" value="${i.r}" oninput="app.filterPriceInput(this,${bi},${ri},'r')" placeholder="参考价"></td>
                    <td class="col-del"><button class="del-row-btn" onclick="app.delRow(${bi},${ri})">✕</button></td>
                </tr>`;
            });
            html += `</tbody></table>
                <button class="add-row-btn" onclick="app.addRow(${bi})">➕ 继续添加一行</button>
            </div>`;
        });
        container.innerHTML = html;
        this.updateStats();
    }
};

app.init();
</script>
</body>
</html>
