<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>批量废旧手机回收清单</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 1600px; margin: 0 auto; }
        
        .btn { background: #10b981; color: white; border: none; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-size: 13px; font-weight: 500; margin: 2px; }
        .btn-purple { background: #8b5cf6; }
        .btn-blue { background: #3b82f6; }
        .btn-red { background: #ef4444; }
        .btn-gray { background: #64748b; }
        
        .row-buttons {
            background: white;
            padding: 10px 20px;
            border-radius: 60px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        
        /* 填表人行 */
        .row-user {
            background: white;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .row-user label {
            font-weight: bold;
        }
        .row-user input {
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #ccc;
            font-size: 14px;
            width: 220px;
        }
        .row-user .required {
            color: #ef4444;
        }
        
        .contact-bar { 
            background: #1e293b; 
            color: white; 
            padding: 12px 20px; 
            border-radius: 40px; 
            margin-bottom: 16px; 
            text-align: center; 
            font-size: 14px; 
        }
        .contact-bar strong { color: #fbbf24; }
        
        .row-search {
            background: white;
            padding: 10px 20px;
            border-radius: 60px;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .search-area {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #f0f2f5;
            padding: 5px 16px;
            border-radius: 40px;
            width: 100%;
            max-width: 400px;
        }
        .search-area span { font-size: 18px; }
        .search-area input {
            border: none;
            padding: 8px;
            flex: 1;
            outline: none;
            font-size: 14px;
            background: transparent;
        }
        .search-area button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .row-add-brand {
            background: white;
            padding: 10px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .row-add-brand input {
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #ccc;
            font-size: 14px;
            width: 200px;
        }
        
        .brand-grid { display: flex; flex-wrap: wrap; gap: 24px; }
        .brand-card { background: white; border-radius: 24px; padding: 18px; flex: 1; min-width: 520px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .brand-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #e2e8f0; }
        .brand-name { font-size: 1.3rem; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #e2e8f0; padding: 6px 4px; text-align: center; }
        th { background: #f8fafc; font-weight: 600; }
        input, select { padding: 5px; border-radius: 10px; border: 1px solid #ccc; }
        .qty-input, .unit-price, .ref-price { width: 70px; text-align: center; }
        .subtotal-cell { background: #fef9e3; font-weight: bold; }
        .delete-row-btn { background: #ef4444; color: white; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 12px; }
        .brand-stats { margin-top: 12px; padding: 8px 12px; background: #f1f5f9; border-radius: 16px; display: flex; justify-content: space-between; font-size: 13px; font-weight: 500; flex-wrap: wrap; gap: 8px; }
        .grand-total { background: #1e293b; color: white; padding: 16px; border-radius: 60px; text-align: center; margin-top: 24px; font-weight: bold; font-size: 16px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .grand-total span { display: inline-block; }
        .ratio-badge { background: #fbbf24; color: #1e293b; padding: 4px 12px; border-radius: 40px; font-size: 13px; margin-left: 10px; }
        .small-btn { background: none; border: 1px solid #cbd5e1; padding: 4px 10px; border-radius: 30px; cursor: pointer; font-size: 11px; }
        .small-btn:hover { background: #f1f5f9; }
        
        @media (max-width: 700px) { .brand-card { min-width: 100%; } }
        
        body.dark { background: #0f172a; }
        body.dark .brand-card { background: #1e293b; color: #f1f5f9; }
        body.dark .row-buttons { background: #1e293b; border: 1px solid #475569; }
        body.dark .row-user { background: #1e293b; border: 1px solid #475569; }
        body.dark .row-search { background: #1e293b; border: 1px solid #475569; }
        body.dark .row-add-brand { background: #1e293b; border: 1px solid #475569; }
        body.dark input, body.dark select { background: #334155; color: white; border-color: #475569; }
        body.dark th { background: #334155; }
        body.dark .brand-stats { background: #334155; }
        body.dark .search-area { background: #334155; }
        body.dark .search-area input { color: white; }
    </style>
</head>
<body>
<div class="container">
    <div class="row-buttons">
        <button id="oneKeyBtn" class="btn btn-purple">📤 一键导出清单</button>
        <button id="backupBtn" class="btn btn-blue">💾 备份</button>
        <button id="restoreBtn" class="btn btn-blue">📂 恢复</button>
        <button id="clearAllBtn" class="btn btn-red">🗑️ 清空</button>
        <button id="printBtn" class="btn btn-gray">🖨️ 打印</button>
        <button id="themeBtn" class="btn btn-gray">🌙 暗色</button>
    </div>

    <!-- 填表人信息 -->
    <div class="row-user">
        <label><span class="required">*</span> 您的称呼/微信：</label>
        <input type="text" id="userName" placeholder="例：张三 或 微信号" value="">
        <span style="font-size: 12px; color: #ef4444;" id="userNameWarning"></span>
    </div>

    <div class="contact-bar">
        📱 批量废旧手机回收 | 微信：<strong>Egg77Egg88</strong> | 全国可寄 · 量大价优
    </div>

    <div class="row-search">
        <div class="search-area">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜索型号...">
            <button id="clearSearch">✖</button>
        </div>
    </div>

    <div class="row-add-brand">
        <span>➕ 添加新品牌：</span>
        <input type="text" id="newBrandName" placeholder="如：魅族">
        <button id="addBrandBtn" class="btn btn-blue" style="padding: 6px 20px;">添加品牌</button>
    </div>

    <div id="brandsGrid" class="brand-grid"></div>

    <div id="grandTotal" class="grand-total">
        <span>💰 实际总金额：<span id="totalActualMoney">0</span> 元</span>
        <span>📊 参考总金额：<span id="totalRefMoney">0</span> 元</span>
        <span id="totalRatioSpan">📈 整体比例：--</span>
    </div>
</div>

<script>
    const FORMSPREE_URL = 'https://formspree.io/f/xvzdzoej';
    const MY_CONTACT = '微信: Egg77Egg88';
    
    let brands = [
        { id: 'oppo', name: 'OPPO' },
        { id: 'vivo', name: 'vivo' },
        { id: 'huawei', name: '华为' },
        { id: 'apple', name: '苹果' },
        { id: 'xiaomi', name: '小米' },
        { id: 'samsung', name: '三星' },
        { id: 'oneplus', name: '一加' }
    ];
    
    let nextId = 100;
    
    function getBrands() { return brands; }
    function genId() { return 'brand_' + (nextId++); }
    
    function createRowHtml() {
        return `<tr class="data-row">
            <td class="model-cell"><input type="text" placeholder="型号" value=""></td>
            <td class="config-cell"><select><option value="">—</option><option value="高配">高配</option><option value="中配">中配</option><option value="低配">低配</option></select></td>
            <td class="qty-cell"><input type="number" min="0" step="1" value="1" class="qty-input" style="width:65px"></td>
            <td class="price-cell"><input type="number" min="0" step="10" value="" class="unit-price" placeholder="单价" style="width:75px"></td>
            <td class="subtotal-cell">0</select></td>
            <td class="ref-cell"><input type="number" min="0" step="10" value="" class="ref-price" placeholder="参考价" style="width:75px"></td>
            <td style="width:35px"><button class="delete-row-btn">✖</button></td>
        </tr>`;
    }
    
    function updateRowSubtotal(row) {
        let qty = parseFloat(row.querySelector('.qty-input')?.value) || 0;
        let price = parseFloat(row.querySelector('.unit-price')?.value) || 0;
        row.querySelector('.subtotal-cell').innerText = (qty * price).toFixed(0);
    }
    
    function updateBrandStats(brandId) {
        let tbody = document.querySelector(`#table-${brandId} tbody`);
        if (!tbody) return;
        let totalMoney = 0, totalQty = 0, totalRef = 0;
        tbody.querySelectorAll('.data-row').forEach(row => {
            totalMoney += parseFloat(row.querySelector('.subtotal-cell')?.innerText) || 0;
            totalQty += parseFloat(row.querySelector('.qty-input')?.value) || 0;
            let qty = parseFloat(row.querySelector('.qty-input')?.value) || 0;
            let ref = parseFloat(row.querySelector('.ref-price')?.value) || 0;
            totalRef += qty * ref;
        });
        let moneySpan = document.getElementById(`money-${brandId}`);
        let qtySpan = document.getElementById(`qty-${brandId}`);
        let refSpan = document.getElementById(`ref-${brandId}`);
        if (moneySpan) moneySpan.innerText = totalMoney.toFixed(0);
        if (qtySpan) qtySpan.innerText = totalQty;
        if (refSpan) refSpan.innerText = totalRef.toFixed(0);
        updateGrandTotal();
        autoSave();
    }
    
    function updateGrandTotal() {
        let totalMoney = 0, totalRef = 0;
        brands.forEach(b => {
            let m = parseFloat(document.getElementById(`money-${b.id}`)?.innerText) || 0;
            let r = parseFloat(document.getElementById(`ref-${b.id}`)?.innerText) || 0;
            totalMoney += m;
            totalRef += r;
        });
        document.getElementById('totalActualMoney').innerText = totalMoney.toFixed(0);
        document.getElementById('totalRefMoney').innerText = totalRef.toFixed(0);
        
        // 计算整体比例
        let ratioText = '--';
        if (totalRef > 0) {
            let ratio = ((totalMoney - totalRef) / totalRef * 100).toFixed(1);
            if (ratio >= 0) {
                ratioText = `📈 比参考价高 ${ratio}%`;
            } else {
                ratioText = `📉 比参考价低 ${Math.abs(ratio)}%`;
            }
        }
        document.getElementById('totalRatioSpan').innerHTML = `📊 整体比例：${ratioText}`;
    }
    
    function bindRowEvents(row, brandId) {
        let handler = () => { updateRowSubtotal(row); updateBrandStats(brandId); };
        row.querySelector('.qty-input').addEventListener('input', handler);
        row.querySelector('.unit-price').addEventListener('input', handler);
        row.querySelector('.ref-price').addEventListener('input', () => updateBrandStats(brandId));
        row.querySelector('.delete-row-btn').addEventListener('click', () => {
            if (document.querySelector(`#table-${brandId} tbody`).children.length > 1) {
                row.remove(); updateBrandStats(brandId);
            } else alert('至少保留一行');
        });
        updateRowSubtotal(row);
    }
    
    function initTable(brandId, rowsCount = 5) {
        let tbody = document.querySelector(`#table-${brandId} tbody`);
        if (!tbody) return;
        tbody.innerHTML = '';
        for (let i = 0; i < rowsCount; i++) tbody.insertAdjacentHTML('beforeend', createRowHtml());
        tbody.querySelectorAll('.data-row').forEach(row => bindRowEvents(row, brandId));
        updateBrandStats(brandId);
    }
    
    function addRow(brandId) {
        let tbody = document.querySelector(`#table-${brandId} tbody`);
        tbody.insertAdjacentHTML('beforeend', createRowHtml());
        bindRowEvents(tbody.lastElementChild, brandId);
        updateBrandStats(brandId);
    }
    
    function deleteBrand(brandId) {
        if (confirm('确定删除该品牌？删除后该品牌的所有数据都会丢失！')) {
            brands = brands.filter(b => b.id !== brandId);
            renderAllBrands();
            autoSave();
        }
    }
    
    function addNewBrand() {
        let name = document.getElementById('newBrandName').value.trim();
        if (!name) return alert('请输入品牌名');
        if (brands.some(b => b.name === name)) return alert('品牌已存在');
        brands.push({ id: genId(), name });
        renderAllBrands();
        document.getElementById('newBrandName').value = '';
        autoSave();
    }
    
    function collectAllData() {
        let result = { brands: [], data: {}, userName: '', submitTime: new Date().toLocaleString() };
        result.userName = document.getElementById('userName').value.trim() || '未填写';
        brands.forEach(b => {
            result.brands.push({ id: b.id, name: b.name });
            let rows = [];
            document.querySelectorAll(`#table-${b.id} tbody .data-row`).forEach(row => {
                rows.push({
                    model: row.querySelector('.model-cell input')?.value || '',
                    config: row.querySelector('.config-cell select')?.value || '',
                    qty: row.querySelector('.qty-input')?.value || '0',
                    price: row.querySelector('.unit-price')?.value || '',
                    ref: row.querySelector('.ref-price')?.value || ''
                });
            });
            result.data[b.id] = rows;
        });
        return result;
    }
    
    function exportToExcel() {
        let data = collectAllData();
        let html = `<!DOCTYPE html>
        <html><head><meta charset="UTF-8"><title>批量废旧手机回收清单</title>
        <style>th,td{border:1px solid #888;padding:8px;text-align:center;} table{margin-bottom:30px;}</style>
        </head><body>
        <h2>📱 批量废旧手机回收清单</h2>
        <p>填表人：${data.userName}</p>
        <p>导出时间: ${data.submitTime}</p>
        <p>回收联系：${MY_CONTACT}</p>
        <hr>`;
        
        for (let brand of brands) {
            let rows = data.data[brand.id] || [];
            html += `<h3>${brand.name}</h3>`;
            html += `<tr><thead>运转<th>型号</th><th>高低配</th><th>数量</th><th>成交单价(元)</th><th>小计(元)</th><th>参考价(元)</th><th>参考小计(元)</th></tr></thead><tbody>`;
            rows.forEach(r => {
                let qty = parseFloat(r.qty) || 0;
                let price = parseFloat(r.price) || 0;
                let ref = parseFloat(r.ref) || 0;
                let subtotal = qty * price;
                let refSubtotal = qty * ref;
                html += `<tr><td>${r.model}</td><td>${r.config}</td><td>${r.qty}</td><td>${r.price ? '¥' + r.price : ''}</td><td>${subtotal.toFixed(0)}</td><td>${r.ref ? '¥' + r.ref : ''}</td><td>${refSubtotal.toFixed(0)}</td></tr>`;
            });
            html += `</tbody></table><br>`;
        }
        
        // 计算总计
        let totalMoney = 0, totalRef = 0;
        brands.forEach(b => {
            totalMoney += parseFloat(document.getElementById(`money-${b.id}`)?.innerText) || 0;
            totalRef += parseFloat(document.getElementById(`ref-${b.id}`)?.innerText) || 0;
        });
        let ratio = '';
        if (totalRef > 0) {
            let r = ((totalMoney - totalRef) / totalRef * 100).toFixed(1);
            ratio = r >= 0 ? `比参考价高 ${r}%` : `比参考价低 ${Math.abs(r)}%`;
        }
        html += `<h3>汇总：实际总金额 ¥${totalMoney.toFixed(0)} | 参考总金额 ¥${totalRef.toFixed(0)} | ${ratio}</h3>`;
        html += `<p>📦 全国批量回收，量大价优，欢迎联系！</p></body></html>`;
        
        let blob = new Blob([html], { type: 'application/vnd.ms-excel' });
        let link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `批量废旧手机清单_${data.userName}_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xls`;
        link.click();
        URL.revokeObjectURL(link.href);
        return data;
    }
    
    async function sendToFormspree(data) {
        try {
            let totalRows = 0;
            for (let brand of brands) {
                totalRows += (data.data[brand.id] || []).length;
            }
            let totalMoney = 0, totalRef = 0;
            brands.forEach(b => {
                totalMoney += parseFloat(document.getElementById(`money-${b.id}`)?.innerText) || 0;
                totalRef += parseFloat(document.getElementById(`ref-${b.id}`)?.innerText) || 0;
            });
            let payload = {
                _subject: `【废旧手机回收数据】${data.userName} 提交的清单`,
                填表人: data.userName,
                提交时间: data.submitTime,
                回收商联系方式: MY_CONTACT,
                品牌数量: brands.length,
                数据行数: totalRows,
                实际总金额: totalMoney.toFixed(0),
                参考总金额: totalRef.toFixed(0),
                详细数据: JSON.stringify(data, null, 2)
            };
            let response = await fetch(FORMSPREE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            return response.ok;
        } catch(e) {
            console.error(e);
            return false;
        }
    }
    
    async function oneKeyExport() {
        let userName = document.getElementById('userName').value.trim();
        if (!userName) {
            document.getElementById('userNameWarning').innerText = '请填写您的称呼/微信';
            return;
        }
        document.getElementById('userNameWarning').innerText = '';
        
        let data = collectAllData();
        let hasData = false;
        for (let brand of brands) {
            if ((data.data[brand.id] || []).length > 0) { hasData = true; break; }
        }
        if (!hasData) {
            alert("请先填写一些手机数据");
            return;
        }
        
        // 1. 下载 Excel
        exportToExcel();
        
        // 2. 下载 JSON 备份（你可以直接恢复）
        let jsonStr = JSON.stringify(data, null, 2);
        let jsonBlob = new Blob([jsonStr], { type: 'application/json' });
        let jsonLink = document.createElement('a');
        jsonLink.href = URL.createObjectURL(jsonBlob);
        jsonLink.download = `废旧手机回收数据_${data.userName}_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
        jsonLink.click();
        URL.revokeObjectURL(jsonLink.href);
        
        // 3. 发送到 Formspree
        await sendToFormspree(data);
        
        alert("✅ 清单已导出！\n\n已下载 Excel 和 JSON 备份文件。\nJSON 文件可以通过「恢复」按钮直接导入。");
    }
    
    function backupData() {
        let data = collectAllData();
        let json = JSON.stringify(data, null, 2);
        let blob = new Blob([json], { type: 'application/json' });
        let link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `废旧手机回收备份_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
        link.click();
        URL.revokeObjectURL(link.href);
    }
    
    function restoreData() {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = e => {
            let file = e.target.files[0];
            if (!file) return;
            let reader = new FileReader();
            reader.onload = ev => {
                try {
                    let data = JSON.parse(ev.target.result);
                    if (data.brands && data.brands.length) {
                        brands = data.brands;
                        if (data.userName) {
                            document.getElementById('userName').value = data.userName;
                        }
                        renderAllBrands();
                        if (data.data) {
                            for (let [bid, rows] of Object.entries(data.data)) {
                                let tbody = document.querySelector(`#table-${bid} tbody`);
                                if (tbody && rows.length) {
                                    tbody.innerHTML = '';
                                    rows.forEach(r => {
                                        tbody.insertAdjacentHTML('beforeend', createRowHtml());
                                        let row = tbody.lastElementChild;
                                        row.querySelector('.model-cell input').value = r.model || '';
                                        row.querySelector('.config-cell select').value = r.config || '';
                                        row.querySelector('.qty-input').value = r.qty || '1';
                                        row.querySelector('.unit-price').value = r.price || '';
                                        row.querySelector('.ref-price').value = r.ref || '';
                                        bindRowEvents(row, bid);
                                    });
                                    updateBrandStats(bid);
                                }
                            }
                        }
                        alert('恢复成功！');
                    } else {
                        alert('文件格式错误');
                    }
                } catch(err) { alert('文件解析失败'); }
            };
            reader.readAsText(file);
        };
        input.click();
    }
    
    function clearAllTables() {
        if (confirm('⚠️ 确定清空所有数据？不可撤销！')) {
            brands.forEach(b => initTable(b.id, 5));
            autoSave();
        }
    }
    
    function printPage() { window.print(); }
    
    function autoSave() {
        let data = collectAllData();
        localStorage.setItem('phone_recycle_data', JSON.stringify(data));
    }
    
    function loadAutoSave() {
        let saved = localStorage.getItem('phone_recycle_data');
        if (saved) {
            try {
                let data = JSON.parse(saved);
                if (data.brands && data.brands.length) {
                    brands = data.brands;
                    if (data.userName) {
                        document.getElementById('userName').value = data.userName;
                    }
                    renderAllBrands();
                    if (data.data) {
                        for (let [bid, rows] of Object.entries(data.data)) {
                            let tbody = document.querySelector(`#table-${bid} tbody`);
                            if (tbody && rows.length) {
                                tbody.innerHTML = '';
                                rows.forEach(r => {
                                    tbody.insertAdjacentHTML('beforeend', createRowHtml());
                                    let row = tbody.lastElementChild;
                                    row.querySelector('.model-cell input').value = r.model || '';
                                    row.querySelector('.config-cell select').value = r.config || '';
                                    row.querySelector('.qty-input').value = r.qty || '1';
                                    row.querySelector('.unit-price').value = r.price || '';
                                    row.querySelector('.ref-price').value = r.ref || '';
                                    bindRowEvents(row, bid);
                                });
                                updateBrandStats(bid);
                            }
                        }
                    }
                }
            } catch(e) {}
        }
    }
    
    function setupSearch() {
        let searchInput = document.getElementById('searchInput');
        let clearBtn = document.getElementById('clearSearch');
        function filter() {
            let kw = searchInput.value.trim().toLowerCase();
            brands.forEach(b => {
                let card = document.getElementById(`card-${b.id}`);
                let rows = document.querySelectorAll(`#table-${b.id} .data-row`);
                let brandMatch = false;
                rows.forEach(row => {
                    let model = row.querySelector('.model-cell input')?.value || '';
                    if (kw === '' || model.toLowerCase().includes(kw)) {
                        row.style.display = '';
                        brandMatch = true;
                    } else {
                        row.style.display = 'none';
                    }
                });
                if (card) card.style.display = (kw !== '' && !brandMatch) ? 'none' : '';
            });
        }
        searchInput.addEventListener('input', filter);
        clearBtn.addEventListener('click', () => { searchInput.value = ''; filter(); });
    }
    
    function setupTheme() {
        let btn = document.getElementById('themeBtn');
        let isDark = localStorage.getItem('darkMode') === 'true';
        if (isDark) document.body.classList.add('dark');
        btn.innerHTML = isDark ? '☀️ 亮色' : '🌙 暗色';
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            let darkNow = document.body.classList.contains('dark');
            localStorage.setItem('darkMode', darkNow);
            btn.innerHTML = darkNow ? '☀️ 亮色' : '🌙 暗色';
        });
    }
    
    function renderAllBrands() {
        let grid = document.getElementById('brandsGrid');
        grid.innerHTML = '';
        brands.forEach(b => {
            let card = document.createElement('div');
            card.className = 'brand-card';
            card.id = `card-${b.id}`;
            card.innerHTML = `
                <div class="brand-header">
                    <span class="brand-name">${b.name}</span>
                    <div>
                        <button class="small-btn add-row-local" data-brand="${b.id}">➕ 加行</button>
                        <button class="small-btn delete-brand-local" data-brand="${b.id}" style="color:#ef4444;">🗑️ 删品牌</button>
                    </div>
                </div>
                <table id="table-${b.id}">
                    <thead>运转<th>型号</th><th>高低配</th><th>数量</th><th>老板填金额(元)</th><th>小计(元)</th><th>参考价(元)</th><th>删除</th></tr></thead>
                    <tbody></tbody>
                </table>
                <div class="brand-stats">
                    <span>📊 共 <span id="qty-${b.id}">0</span> 台</span>
                    <span>💰 实际金额：¥<span id="money-${b.id}">0</span> 元</span>
                    <span>📋 参考金额：¥<span id="ref-${b.id}">0</span> 元</span>
                </div>
            `;
            grid.appendChild(card);
            initTable(b.id, 5);
            card.querySelector('.add-row-local').addEventListener('click', () => addRow(b.id));
            card.querySelector('.delete-brand-local').addEventListener('click', () => deleteBrand(b.id));
        });
    }
    
    function init() {
        renderAllBrands();
        loadAutoSave();
        setupSearch();
        setupTheme();
        document.getElementById('oneKeyBtn').addEventListener('click', oneKeyExport);
        document.getElementById('backupBtn').addEventListener('click', backupData);
        document.getElementById('restoreBtn').addEventListener('click', restoreData);
        document.getElementById('clearAllBtn').addEventListener('click', clearAllTables);
        document.getElementById('printBtn').addEventListener('click', printPage);
        document.getElementById('addBrandBtn').addEventListener('click', addNewBrand);
        window.addEventListener('beforeunload', autoSave);
    }
    init();
</script>
</body>
</html>
