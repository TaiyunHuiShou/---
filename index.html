<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>钛云数码-专业对账系统</title>
    <style>
        :root { --main: #2563eb; --price: #dc2626; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: system-ui; margin: 0; padding: 10px; }

        /* 顶部固定导航 */
        .admin-bar { background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 12px; display: flex; gap: 6px; position: sticky; top: 5px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 10px 5px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; color: white; flex: 1; text-align: center; }
        .btn-blue { background: var(--main); }
        .btn-gray { background: #64748b; }
        .btn-green { background: #10b981; }

        .brand-section { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .brand-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-left: 4px solid var(--main); padding-left: 10px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 11px; color: #94a3b8; text-align: left; padding-bottom: 8px; }
        
        /* 输入框优化：不再触发重绘 */
        input { border: 1px solid #e2e8f0; background: #fff; padding: 10px; border-radius: 6px; font-size: 14px; width: 100%; outline: none; }
        input:focus { border-color: var(--main); background: #eff6ff; }
        .input-price { color: var(--price); font-weight: bold; text-align: right; }

        .row-action { display: flex; gap: 10px; margin-top: 10px; }
        .add-btn { color: var(--main); font-size: 13px; font-weight: bold; cursor: pointer; border: 1px dashed var(--main); padding: 5px; text-align: center; border-radius: 6px; flex: 1; }

        .grand-summary { background: #1e293b; color: white; padding: 20px; border-radius: 15px; margin-top: 20px; display: flex; justify-content: space-between; }
        .grand-summary b { color: #fbbf24; font-size: 20px; }
    </style>
</head>
<body>

<div class="admin-bar">
    <button class="btn btn-blue" onclick="copyBackup()">📋 复制备份</button>
    <button class="btn btn-green" onclick="pasteRestore()">📥 粘贴恢复</button>
    <button class="btn btn-gray" onclick="exportJSON()">💾 导出文件</button>
</div>

<div id="main-content"></div>

<div class="grand-summary">
    <div>数量: <b id="total-q">0</b> 台</div>
    <div>总计: ¥ <b id="total-m">0</b></div>
</div>

<div style="text-align:center; color:#94a3b8; font-size:12px; margin-top:20px;">
    钛云数码 · 数据实时自动保存
</div>

<script>
    const DEFAULT_BRANDS = ["苹果", "华为", "小米/红米", "OPPO", "vivo", "二线/杂牌"];
    let brands = JSON.parse(localStorage.getItem('ty_brands')) || DEFAULT_BRANDS;
    let data = JSON.parse(localStorage.getItem('ty_data')) || {};

    // 渲染函数：只在页面开启或品牌增减时调用，录入时不刷新
    function renderAll() {
        const container = document.getElementById('main-content');
        container.innerHTML = brands.map(b => {
            if(!data[b]) data[b] = [{m:'', q:1, p:''}];
            return `
                <div class="brand-section">
                    <div class="brand-header">
                        <strong style="font-size:16px">${b}</strong>
                    </div>
                    <table id="table-${b}">
                        <thead><tr><th>型号</th><th width="50">数量</th><th width="100">单价</th></tr></thead>
                        <tbody>
                            ${data[b].map((r, i) => renderRow(b, i, r)).join('')}
                        </tbody>
                    </table>
                    <div class="row-action">
                        <div class="add-btn" onclick="addNewRow('${b}')">+ 添加${b}型号</div>
                    </div>
                </div>
            `;
        }).join('');
        calc();
    }

    function renderRow(b, i, r) {
        return `
            <tr id="row-${b}-${i}">
                <td><input type="text" value="${r.m}" onchange="updateData('${b}', ${i}, 'm', this.value)" placeholder="如: 15 Pro Max"></td>
                <td><input type="number" value="${r.q}" onchange="updateData('${b}', ${i}, 'q', this.value)" style="text-align:center"></td>
                <td><input type="number" class="input-price" value="${r.p}" onchange="updateData('${b}', ${i}, 'p', this.value)" placeholder="¥ 0"></td>
            </tr>
        `;
    }

    // 更新数据逻辑：改为 onchange，录入完点别处才保存，且不刷新页面
    function updateData(b, i, k, v) {
        data[b][i][k] = v;
        localStorage.setItem('ty_data', JSON.stringify(data));
        calc();
    }

    function addNewRow(b) {
        data[b].push({m:'', q:1, p:''});
        const tbody = document.querySelector(`#table-${b} tbody`);
        const newIndex = data[b].length - 1;
        tbody.insertAdjacentHTML('beforeend', renderRow(b, newIndex, data[b][newIndex]));
    }

    function calc() {
        let tQ = 0, tM = 0;
        brands.forEach(b => {
            (data[b] || []).forEach(r => {
                const q = parseFloat(r.q)||0, p = parseFloat(r.p)||0;
                tQ += q; tM += (q*p);
            });
        });
        document.getElementById('total-q').innerText = tQ;
        document.getElementById('total-m').innerText = tM.toLocaleString();
    }

    // ---------------- 备份恢复“防走丢”增强方案 ----------------

    // 方案A：复制到剪贴板（最适合微信）
    function copyBackup() {
        const str = btoa(encodeURIComponent(JSON.stringify({brands, data})));
        const el = document.createElement('textarea');
        el.value = "钛云备份代码：" + str;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert('✅ 备份代码已复制！\n你可以直接在微信粘贴发给好友，对方复制后点“粘贴恢复”即可。');
    }

    // 方案B：从剪贴板恢复
    async function pasteRestore() {
        const raw = prompt('请粘贴收到的“钛云备份代码”：');
        if(!raw) return;
        try {
            const cleanStr = raw.replace('钛云备份代码：', '').trim();
            const decoded = JSON.parse(decodeURIComponent(atob(cleanStr)));
            if(decoded.data) {
                data = decoded.data;
                brands = decoded.brands || brands;
                localStorage.setItem('ty_data', JSON.stringify(data));
                renderAll();
                alert('✅ 恢复成功！');
            }
        } catch(e) {
            alert('❌ 恢复失败：代码格式不正确');
        }
    }

    // 方案C：传统文件导出（作为备选）
    function exportJSON() {
        const blob = new Blob([JSON.stringify({brands, data})], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `钛云数码_备份.json`;
        a.click();
        alert('文件已尝试下载。如果找不到，请使用“复制备份”功能，更方便！');
    }

    renderAll();
</script>
</body>
</html>
