<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>数码回收专业报货对账系统</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --main: #2563eb; --price: #dc2626; --bg: #f1f5f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding: 10px; font-family: system-ui; color: #1e293b; }

        /* 顶部品牌区 - 隐形推广 */
        .brand-header { padding: 10px 5px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; margin-bottom: 10px; }
        .brand-header b { font-size: 14px; color: #94a3b8; font-weight: 500; letter-spacing: 1px; }

        /* 报货单主体 */
        #poster-area { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .poster-title { font-size: 22px; font-weight: 900; border-left: 5px solid var(--main); padding-left: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 11px; color: #94a3b8; text-align: left; padding-bottom: 10px; border-bottom: 1px solid #f1f5f9; }
        td { padding: 10px 2px; border-bottom: 1px solid #f8fafc; }

        /* 专业化输入控件 */
        input { border: none; background: #f8fafc; padding: 10px 8px; border-radius: 6px; font-size: 14px; width: 100%; outline: none; transition: 0.2s; }
        input:focus { background: white; box-shadow: inset 0 0 0 1px var(--main); }
        .input-price { color: var(--price); font-weight: 800; text-align: right; background: #fff1f2; }
        
        /* 配置快捷选择 - 解决你说的配置问题 */
        .conf-select { border: 1px solid #e2e8f0; background: white; padding: 8px 4px; border-radius: 6px; font-size: 12px; width: 100%; }

        /* 汇总栏 */
        .summary-bar { margin-top: 25px; background: #1e293b; color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .total-item p { margin: 0; font-size: 11px; opacity: 0.6; }
        .total-item b { font-size: 22px; color: #fbbf24; }

        /* 悬浮操作台 */
        .floating-actions { position: fixed; bottom: 20px; left: 10px; right: 10px; display: flex; gap: 10px; z-index: 100; }
        .btn { flex: 1; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); }
        .btn-white { background: white; color: #64748b; }
        .btn-blue { background: var(--main); color: white; }

        /* 遮罩 */
        #mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; padding:20px; text-align:center; }
    </style>
</head>
<body>

<div class="brand-header">
    <b id="brand-tag">TIYUN DIGITAL SYSTEM</b>
    <span style="font-size: 11px; color: #cbd5e1;">V2.1 专业对账版</span>
</div>

<div id="poster-area">
    <div class="poster-title">
        <span>报货对账单</span>
        <span id="date-str" style="font-size: 12px; color: #94a3b8; font-weight: normal;"></span>
    </div>

    <table>
        <thead>
            <tr>
                <th>型号描述</th>
                <th width="70">配置</th>
                <th width="50">数量</th>
                <th width="90" style="text-align:right">档口报价</th>
            </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>

    <div class="summary-bar">
        <div class="total-item">
            <p>合计数量</p>
            <b id="total-q">0</b><span style="font-size:12px; margin-left:4px">台</span>
        </div>
        <div class="total-item" style="text-align: right;">
            <p>结算总额</p>
            <span style="font-size:14px; color:#fbbf24">¥</span> <b id="total-m">0</b>
        </div>
    </div>
    
    <div style="margin-top:20px; text-align:center; font-size:10px; color:#e2e8f0; letter-spacing: 2px;">
        技术支持: 钛云数码 (Egg77Egg88)
    </div>
</div>

<div style="height: 100px;"></div>

<div class="floating-actions">
    <button class="btn btn-white" onclick="reset()">清空清单</button>
    <button class="btn btn-blue" onclick="exportImg()">生成对账长图</button>
</div>

<div id="mask">
    <p style="color:white; font-size:14px; margin-bottom:15px">图片已生成，请长按保存并发送对账</p>
    <div id="img-container"></div>
    <button onclick="closeMask()" style="margin-top:20px; padding:10px 30px; border-radius:8px; border:none; background:white">返回修改</button>
</div>

<script>
    let rows = JSON.parse(localStorage.getItem('tiyun_rows')) || [{m:'', c:'标配', q:1, p:''}];

    function render() {
        const body = document.getElementById('list-body');
        body.innerHTML = rows.map((r, i) => `
            <tr>
                <td><input type="text" value="${r.m}" placeholder="型号/成色..." oninput="upd(${i},'m',this.value)"></td>
                <td>
                    <select class="conf-select" onchange="upd(${i},'c',this.value)">
                        <option value="标配" ${r.c==='标配'?'selected':''}>标配</option>
                        <option value="高配" ${r.c==='高配'?'selected':''}>高配</option>
                        <option value="顶配" ${r.c==='顶配'?'selected':''}>顶配</option>
                        <option value="低配" ${r.c==='低配'?'selected':''}>低配</option>
                    </select>
                </td>
                <td><input type="number" style="text-align:center" value="${r.q}" oninput="upd(${i},'q',this.value)"></td>
                <td><input type="number" class="input-price" value="${r.p}" placeholder="¥待填" oninput="upd(${i},'p',this.value)"></td>
            </tr>
        `).join('');

        // 自动增行逻辑：最后一行只要填了型号，就自动出新行
        if(rows[rows.length-1].m !== '') {
            rows.push({m:'', c:'标配', q:1, p:''});
            render();
        }

        document.getElementById('date-str').innerText = new Date().toLocaleDateString();
        calc();
    }

    function upd(i, k, v) {
        rows[i][k] = v;
        localStorage.setItem('tiyun_rows', JSON.stringify(rows));
        calc();
    }

    function calc() {
        let q = 0, m = 0;
        rows.forEach(r => {
            const qty = parseFloat(r.q) || 0;
            const prc = parseFloat(r.p) || 0;
            q += qty; m += (qty * prc);
        });
        document.getElementById('total-q').innerText = q;
        document.getElementById('total-m').innerText = m.toLocaleString();
    }

    function reset() {
        if(confirm('确定开启新的一单？')) {
            rows = [{m:'', c:'标配', q:1, p:''}];
            render();
        }
    }

    async function exportImg() {
        // 隐藏不必要的UI
        document.querySelector('.floating-actions').style.display = 'none';
        
        const canvas = await html2canvas(document.getElementById('poster-area'), { scale: 3 });
        const img = new Image();
        img.src = canvas.toDataURL();
        img.style.width = '100%';
        img.style.borderRadius = '8px';
        
        document.getElementById('img-container').innerHTML = '';
        document.getElementById('img-container').appendChild(img);
        document.getElementById('mask').style.display = 'block';
        document.querySelector('.floating-actions').style.display = 'flex';
    }

    function closeMask() { document.getElementById('mask').style.display = 'none'; }

    render();
</script>
</body>
</html>
