<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>太云数码-极速回收报货清单</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --primary: #e11d48; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 12px; margin: 0; }
        
        /* 顶部操作栏 */
        .header-tools { background: white; padding: 15px; border-radius: 16px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: sticky; top: 10px; z-index: 100; border: 1px solid #e2e8f0; }
        .logo-box h2 { margin: 0; font-size: 18px; color: var(--primary); }
        .logo-box p { margin: 2px 0 0; font-size: 11px; color: #64748b; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn { border: none; padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-second { background: #f1f5f9; color: #475569; }
        .btn:active { transform: scale(0.95); }

        /* 清单主体 */
        #poster-area { background: white; padding: 20px; border-radius: 4px; position: relative; }
        .brand-block { margin-bottom: 20px; border: 1px solid #f1f5f9; border-radius: 8px; overflow: hidden; }
        .brand-title { background: #f8fafc; padding: 10px 15px; font-weight: bold; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; color: #334155; }
        
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 11px; color: #94a3b8; padding: 10px 8px; text-align: left; background: white; text-transform: uppercase; }
        td { padding: 6px 8px; border-bottom: 1px solid #f8fafc; }
        
        /* 输入框样式定制：去掉所有花里胡哨 */
        input { border: 1px solid transparent; background: #f8fafc; border-radius: 6px; padding: 10px; font-size: 14px; width: 100%; transition: 0.2s; }
        input:focus { background: white; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.1); outline: none; }
        .price-input { font-weight: bold; color: var(--primary); text-align: right; background: #fff1f2; }
        
        /* 统计栏 */
        .summary-box { margin-top: 20px; padding: 20px; background: var(--text); color: white; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .summary-box .total-num { font-size: 24px; font-weight: 800; color: #fbbf24; }
        
        /* 隐藏元素 */
        .no-export { width: 40px; text-align: center; }
        .btn-add { background: #f1f5f9; color: #3b82f6; border: none; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .btn-del { border: none; background: none; color: #cbd5e1; font-size: 18px; cursor: pointer; }

        /* 图片预览层 */
        #mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; overflow-y:auto; padding:20px; }
    </style>
</head>
<body>

<div class="header-tools">
    <div class="logo-box">
        <h2>太云数码报价系统</h2>
        <p>微信：Egg77Egg88 | 极速收货</p>
    </div>
    <div class="btn-group">
        <button class="btn btn-second" onclick="clearAll()">清空</button>
        <button class="btn btn-main" onclick="makeImage()">生成报货图</button>
    </div>
</div>

<div id="poster-area">
    <div id="render-target"></div>

    <div class="summary-box">
        <div style="text-align: left;">
            <p style="margin:0; opacity:0.6; font-size:12px;">已录入数量</p>
            <div id="total-qty" class="total-num">0</div>
        </div>
        <div style="text-align: right;">
            <p style="margin:0; opacity:0.6; font-size:12px;">估算总价值</p>
            <div id="total-money" class="total-num">¥ 0</div>
        </div>
    </div>
    <p style="text-align: center; color: #94a3b8; font-size: 10px; margin-top: 15px;">清单生成时间：<span id="time-stamp"></span></p>
</div>

<div id="mask">
    <p style="color:white; text-align:center;">长按下方图片保存，发送给客户/老板</p>
    <div id="img-container"></div>
    <div style="text-align:center; margin-top:20px;">
        <button class="btn" style="background:white;" onclick="closeMask()">返回修改</button>
    </div>
</div>

<script>
    const brands = ['苹果', '华为', '小米', 'OPPO', 'vivo', '平板/电脑', '其他'];
    const KEY = 'taiyun_clean_v1';
    
    // 初始化数据结构
    let data = JSON.parse(localStorage.getItem(KEY)) || 
               brands.map(name => ({ name, rows: [{ m:'', q:1, p:'' }] }));

    function draw() {
        const target = document.getElementById('render-target');
        target.innerHTML = data.map((b, bIdx) => `
            <div class="brand-block">
                <div class="brand-title">
                    <span>${b.name}</span>
                    <button class="btn-add" onclick="addRow(${bIdx})">＋ 加行</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>手机型号 / 详细配置描述</th>
                            <th width="70">数量</th>
                            <th width="100" style="text-align:right">老板报价</th>
                            <th class="no-export" width="40"></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${b.rows.map((r, rIdx) => `
                            <tr>
                                <td><input type="text" value="${r.m}" oninput="val(${bIdx}, ${rIdx}, 'm', this.value)" placeholder="型号、成色、损耗..."></td>
                                <td><input type="number" value="${r.q}" oninput="val(${bIdx}, ${rIdx}, 'q', this.value)"></td>
                                <td><input type="number" class="price-input" value="${r.p}" oninput="val(${bIdx}, ${rIdx}, 'p', this.value)" placeholder="¥ 待填"></td>
                                <td class="no-export"><button class="btn-del" onclick="delRow(${bIdx}, ${rIdx})">×</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `).join('');
        
        document.getElementById('time-stamp').innerText = new Date().toLocaleString();
        count();
    }

    function val(bi, ri, k, v) {
        data[bi].rows[ri][k] = v;
        localStorage.setItem(KEY, JSON.stringify(data));
        count();
    }

    function addRow(bi) {
        data[bi].rows.push({ m:'', q:1, p:'' });
        draw();
    }

    function delRow(bi, ri) {
        data[bi].rows.splice(ri, 1);
        if(data[bi].rows.length === 0) data[bi].rows.push({ m:'', q:1, p:'' });
        draw();
        localStorage.setItem(KEY, JSON.stringify(data));
    }

    function count() {
        let tq = 0, tm = 0;
        data.forEach(b => {
            b.rows.forEach(r => {
                const q = parseFloat(r.q) || 0;
                const p = parseFloat(r.p) || 0;
                tq += q;
                tm += (q * p);
            });
        });
        document.getElementById('total-qty').innerText = tq;
        document.getElementById('total-money').innerText = '¥ ' + tm.toLocaleString();
    }

    async function makeImage() {
        // 1. 清理空行：导出图片前，不显示型号为空的行
        // (可选：如果想保持原样则跳过此步)

        // 2. 隐藏操作按钮
        document.querySelectorAll('.no-export, .btn-add').forEach(el => el.style.visibility = 'hidden');
        
        const area = document.getElementById('poster-area');
        const canvas = await html2canvas(area, { scale: 2, backgroundColor: '#f8fafc' });
        
        const img = new Image();
        img.src = canvas.toDataURL("image/png");
        img.style.width = "100%";
        img.style.borderRadius = "12px";
        
        document.getElementById('img-container').innerHTML = '';
        document.getElementById('img-container').appendChild(img);
        document.getElementById('mask').style.display = 'block';

        // 还原显示
        document.querySelectorAll('.no-export, .btn-add').forEach(el => el.style.visibility = 'visible');
    }

    function closeMask() { document.getElementById('mask').style.display = 'none'; }

    function clearAll() {
        if(confirm('清空所有清单？')) {
            localStorage.removeItem(KEY);
            location.reload();
        }
    }

    draw();
</script>
</body>
</html>
